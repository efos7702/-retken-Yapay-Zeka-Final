<div class="chat-container">
  <button class="chat-open-btn" id="openChat">💬 Sohbet</button>

  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <h3>Chat Bot</h3>
      <button id="closeChat" class="close-btn">X</button>
    </div>

    <div class="chat-messages" id="messages">
      <div class="bot-msg">Merhaba! Nasıl yardımcı olabilirim?</div>
    </div>

    <div class="quick-buttons">
      <button class="quick" data-text="Merhaba">Merhaba</button>
      <button class="quick" data-text="Bilgi alabilir miyim">Bilgi</button>
      <button class="quick" data-text="İletişim">İletişim</button>
    </div>

    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Mesaj yaz...">
      <button id="sendBtn" class="send-btn">Gönder</button>
    </div>
  </div>
